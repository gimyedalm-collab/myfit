<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#3182f6" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>마이핏</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family:
          'Apple SD Gothic Neo', 'Pretendard', 'Malgun Gothic', sans-serif;
        background: #f2f4f6;
        color: #191f28;
        padding-bottom: 130px;
      }
      .top {
        padding: 18px 20px 6px;
        font-size: 20px;
        font-weight: 800;
      }
      .top small {
        display: block;
        font-size: 13px;
        color: #8b95a1;
        font-weight: 500;
        margin-top: 2px;
      }
      .wrap {
        padding: 0 16px;
      }
      .card {
        background: #fff;
        border-radius: 14px;
        padding: 16px;
        margin: 10px 0;
        border: 1px solid #edeff2;
      }
      .card h3 {
        font-size: 15px;
        margin-bottom: 10px;
      }
      .muted {
        color: #8b95a1;
        font-size: 13px;
      }
      .btn {
        display: block;
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 15px;
        font-size: 16px;
        font-weight: 700;
        background: #3182f6;
        color: #fff;
        cursor: pointer;
      }
      .btn.gray {
        background: #eef1f4;
        color: #333d4b;
      }
      .btn.small {
        width: auto;
        display: inline-block;
        padding: 8px 14px;
        font-size: 13px;
        border-radius: 10px;
      }
      .btn.red {
        background: #fee;
        color: #e5484d;
      }
      .chip {
        display: inline-block;
        padding: 7px 13px;
        border-radius: 10px;
        background: #f2f4f6;
        color: #4e5968;
        font-size: 13px;
        font-weight: 600;
        margin: 3px 4px 3px 0;
        cursor: pointer;
        border: 1.5px solid transparent;
      }
      .chip.on {
        background: #e8f1fe;
        color: #3182f6;
        border-color: #3182f6;
      }
      input,
      select,
      textarea {
        border: 1.5px solid #e5e8eb;
        border-radius: 10px;
        padding: 10px;
        font-size: 15px;
        width: 100%;
        background: #fff;
        font-family: inherit;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: #3182f6;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .row > * {
        flex: 1;
      }
      .nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #fff;
        border-top: 1px solid #e5e8eb;
        display: flex;
        padding-bottom: env(safe-area-inset-bottom);
        z-index: 10;
      }
      .nav button {
        flex: 1;
        border: 0;
        background: none;
        padding: 9px 0 7px;
        font-size: 11px;
        color: #8b95a1;
        cursor: pointer;
        font-weight: 600;
      }
      .nav button.on {
        color: #3182f6;
      }
      .nav button span {
        display: block;
        font-size: 21px;
        margin-bottom: 2px;
      }
      .nav button span svg {
        display: block;
        margin: 0 auto;
      }
      .exname {
        font-weight: 700;
        font-size: 15px;
      }
      .extag {
        font-size: 11px;
        color: #8b95a1;
        margin-left: 6px;
      }
      .setrow {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-top: 8px;
      }
      .setrow .no {
        width: 26px;
        text-align: center;
        color: #8b95a1;
        font-size: 13px;
        flex: none;
      }
      .setrow input {
        text-align: center;
        padding: 9px 4px;
      }
      .setrow .ck {
        flex: none;
        width: 42px;
        height: 40px;
        border-radius: 10px;
        border: 1.5px solid #e5e8eb;
        background: #fff;
        font-size: 17px;
        color: #c9cfd6;
        cursor: pointer;
      }
      .setrow .ck.on {
        background: #3182f6;
        border-color: #3182f6;
        color: #fff;
      }
      .lastrec {
        font-size: 12px;
        color: #3182f6;
        background: #e8f1fe;
        border-radius: 8px;
        padding: 6px 10px;
        margin-top: 6px;
        display: inline-block;
      }
      .bar {
        height: 8px;
        background: #eef1f4;
        border-radius: 4px;
        overflow: hidden;
        margin-top: 6px;
      }
      .bar i {
        display: block;
        height: 100%;
        background: #3182f6;
        border-radius: 4px;
      }
      .pbar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0;
        font-size: 13px;
      }
      .pbar b {
        width: 44px;
        flex: none;
      }
      .pbar .bar {
        flex: 1;
        margin: 0;
      }
      .pbar span {
        width: 56px;
        flex: none;
        text-align: right;
        color: #8b95a1;
        font-size: 12px;
      }
      .timer {
        position: fixed;
        bottom: calc(58px + env(safe-area-inset-bottom));
        left: 0;
        right: 0;
        background: #191f28;
        color: #fff;
        padding: 12px 20px;
        display: none;
        align-items: center;
        gap: 12px;
        z-index: 11;
      }
      .timer.show {
        display: flex;
      }
      .timer b {
        font-size: 24px;
        font-variant-numeric: tabular-nums;
      }
      .timer button {
        border: 0;
        border-radius: 8px;
        padding: 8px 12px;
        background: #333d4b;
        color: #fff;
        font-size: 13px;
        cursor: pointer;
      }
      .meal-item,
      .hist-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 9px 0;
        border-bottom: 1px solid #f2f4f6;
        font-size: 14px;
      }
      .formbtn {
        border: 0;
        background: #eef1f4;
        color: #4e5968;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        padding: 4px 9px;
        cursor: pointer;
        margin-left: 6px;
      }
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 30;
        align-items: flex-end;
      }
      .modal.show {
        display: flex;
      }
      .modalcard {
        background: #fff;
        width: 100%;
        max-height: 82vh;
        overflow-y: auto;
        border-radius: 20px 20px 0 0;
        padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
        line-height: 1.5;
        font-size: 14px;
        animation: up 0.2s ease;
      }
      @keyframes up {
        from {
          transform: translateY(30px);
        }
      }
      @media (min-width: 640px) {
        .modal {
          align-items: center;
        }
        .modalcard {
          max-width: 440px;
          margin: 0 auto;
          border-radius: 20px;
        }
      }
      .del {
        color: #e5484d;
        background: none;
        border: 0;
        font-size: 16px;
        cursor: pointer;
        padding: 2px 6px;
      }
      .big {
        font-size: 26px;
        font-weight: 800;
      }
      .grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      label.f {
        font-size: 12px;
        color: #8b95a1;
        display: block;
        margin: 10px 0 4px;
        font-weight: 600;
      }
      .tip {
        background: #fff8e6;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        color: #8a6d1a;
        margin-top: 8px;
      }
      .stp {
        display: flex;
        align-items: center;
        flex: 1;
      }
      .stp button {
        flex: none;
        width: 34px;
        height: 40px;
        border: 1.5px solid #e5e8eb;
        background: #f7f8fa;
        font-size: 18px;
        cursor: pointer;
        color: #4e5968;
      }
      .stp button:first-child {
        border-radius: 10px 0 0 10px;
      }
      .stp button:last-child {
        border-radius: 0 10px 10px 0;
      }
      .stp input {
        border-radius: 0;
        border-left: 0;
        border-right: 0;
        flex: 1;
        min-width: 0;
      }
      .pklist {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 300px;
        overflow-y: auto;
        margin-top: 8px;
      }
      .pkitem {
        text-align: left;
        border: 1px solid #edeff2;
        background: #fff;
        border-radius: 10px;
        padding: 11px 12px;
        font-size: 14px;
        cursor: pointer;
      }
      .prbadge {
        display: inline-block;
        background: #fff3d6;
        color: #a8760a;
        border-radius: 8px;
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 600;
        margin: 6px 0 0 6px;
      }
      .seg {
        display: flex;
        gap: 6px;
      }
      .seg button {
        flex: 1;
        padding: 11px;
        border: 1.5px solid #e5e8eb;
        background: #fff;
        border-radius: 10px;
        font-size: 14px;
        cursor: pointer;
        color: #4e5968;
      }
      .seg button.on {
        border-color: #3182f6;
        color: #3182f6;
        background: #e8f1fe;
        font-weight: 700;
      }
      body.dark {
        background: #17181c;
        color: #e8eaed;
      }
      body.dark .card {
        background: #212228;
        border-color: #2c2e36;
      }
      body.dark .top small,
      body.dark .muted,
      body.dark .card.muted {
        color: #9aa0a8;
      }
      body.dark input,
      body.dark select,
      body.dark textarea {
        background: #2a2c33;
        border-color: #3a3d47;
        color: #e8eaed;
      }
      body.dark .chip {
        background: #2a2c33;
        color: #c5c9d1;
      }
      body.dark .chip.on {
        background: #12325e;
        color: #7db3ff;
        border-color: #3182f6;
      }
      body.dark .btn.gray {
        background: #2a2c33;
        color: #c5c9d1;
      }
      body.dark .nav {
        background: #1c1d22;
        border-color: #2c2e36;
      }
      body.dark .timer {
        background: #000;
      }
      body.dark .modalcard {
        background: #212228;
      }
      body.dark .formbtn,
      body.dark .stp button,
      body.dark .pkitem,
      body.dark .seg button {
        background: #2a2c33;
        color: #c5c9d1;
        border-color: #3a3d47;
      }
      body.dark .seg button.on {
        background: #12325e;
        color: #7db3ff;
      }
      body.dark .bar {
        background: #2c2e36;
      }
      body.dark .lastrec {
        background: #12325e;
        color: #7db3ff;
      }
      body.dark .setrow .ck {
        background: #2a2c33;
        border-color: #3a3d47;
      }
      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .wrap {
        animation: rise 0.28s ease;
      }
      .nav button {
        transition: transform 0.08s;
      }
      .nav button:active {
        transform: scale(0.94);
      }
      .setrow .ck.on {
        animation: ckpop 0.25s ease;
      }
      @keyframes ckpop {
        50% {
          transform: scale(1.18);
        }
      }
      .cele {
        position: fixed;
        inset: 0;
        background: rgba(15, 20, 30, 0.55);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 40;
      }
      .cele.show {
        display: flex;
        animation: celefade 0.2s ease;
      }
      @keyframes celefade {
        from {
          opacity: 0;
        }
      }
      .celecard {
        background: #fff;
        border-radius: 20px;
        padding: 28px 34px;
        text-align: center;
        min-width: 220px;
        animation: celepop 0.32s cubic-bezier(0.22, 1, 0.36, 1);
      }
      body.dark .celecard {
        background: #212228;
        color: #e8eaed;
      }
      @keyframes celepop {
        from {
          transform: scale(0.86);
          opacity: 0;
        }
      }
      .celering {
        width: 78px;
        height: 78px;
      }
      .celecirc {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: celedraw 0.5s ease forwards;
      }
      .celecheck {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: celedraw 0.4s 0.3s ease forwards;
      }
      @keyframes celedraw {
        to {
          stroke-dashoffset: 0;
        }
      }
      .celeh {
        font-size: 16px;
        font-weight: 700;
        margin-top: 12px;
      }
      .celev {
        font-size: 30px;
        font-weight: 800;
        color: #3182f6;
        margin-top: 4px;
      }
      .celes {
        font-size: 12px;
        color: #8b95a1;
      }
      .celetag {
        display: inline-block;
        background: #fff3d6;
        color: #a8760a;
        border-radius: 8px;
        padding: 5px 12px;
        font-size: 13px;
        font-weight: 600;
        margin: 10px 4px 0;
      }
      body.dark .celetag {
        background: #3a3420;
        color: #e8c877;
      }
      @media (prefers-reduced-motion: reduce) {
        .wrap,
        .celecard,
        .celecirc,
        .celecheck,
        .cele.show,
        .setrow .ck.on {
          animation: none !important;
        }
        .celecirc,
        .celecheck {
          stroke-dashoffset: 0;
        }
      }
      .tip.warn {
        background: #fdecec;
        color: #c0392b;
      }
      .tip.warn a {
        color: #c0392b;
        font-weight: 700;
      }
      body.dark .tip {
        background: #2a2617;
        color: #e0cf92;
      }
      body.dark .tip.warn {
        background: #3a2020;
        color: #f2a6a6;
      }
      body.dark .tip.warn a {
        color: #ff9d9d;
      }
      .mrow {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 7px 0;
        font-size: 13px;
      }
      .mlab {
        width: 46px;
        flex: none;
        color: #4e5968;
      }
      .mrow .bar {
        flex: 1;
        margin: 0;
      }
      .mval {
        width: 82px;
        flex: none;
        text-align: right;
        color: #8b95a1;
        font-size: 12px;
      }
      .cbubble { max-width: 82%; padding: 10px 13px; border-radius: 14px; margin: 8px 0; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
      .cbubble.me { background: #3182f6; color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
      .cbubble.ai { background: #fff; border: 1px solid #edeff2; border-bottom-left-radius: 4px; }
      body.dark .cbubble.ai { background: #212228; border-color: #2c2e36; }
      .cbubble img { max-width: 180px; border-radius: 10px; display: block; }
      .cnote { text-align: center; font-size: 12px; color: #8b95a1; margin: 8px 0; }
      .coachbar { position: fixed; bottom: calc(58px + env(safe-area-inset-bottom)); left: 0; right: 0; background: #fff; border-top: 1px solid #e5e8eb; display: flex; gap: 8px; padding: 8px 12px; align-items: center; z-index: 12; }
      body.dark .coachbar { background: #1c1d22; border-color: #2c2e36; }
      .coachbar input[type='text'] { flex: 1; min-width: 0; }
      .coachbar .cphoto { flex: none; background: #eef1f4; color: #4e5968; border-radius: 10px; padding: 11px 12px; font-size: 13px; cursor: pointer; }
      body.dark .coachbar .cphoto { background: #2a2c33; color: #c5c9d1; }
      .coachbar button { flex: none; border: 0; background: #3182f6; color: #fff; border-radius: 10px; padding: 11px 15px; font-size: 14px; font-weight: 700; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="timer" id="timerbar">
      <span>휴식</span><b id="tval">0:00</b
      ><button onclick="addTime()">+30초</button
      ><button onclick="stopTimer()">건너뛰기</button>
    </div>
    <div
      class="modal"
      id="modal"
      onclick="if (event.target === this) closeForm();"
    >
      <div class="sheet">
        <div id="modalbody"></div>
        <button class="btn gray" style="margin-top: 14px" onclick="closeForm()">
          닫기
        </button>
      </div>
    </div>
    <div class="cele" id="cele">
      <div class="celecard">
        <svg class="celering" viewBox="0 0 80 80">
          <circle
            class="celecirc"
            cx="40"
            cy="40"
            r="34"
            fill="none"
            stroke="#3182f6"
            stroke-width="5"
            stroke-linecap="round"
            pathLength="100"
          />
          <path
            class="celecheck"
            d="M26 41 l10 10 l19 -21"
            fill="none"
            stroke="#3182f6"
            stroke-width="5"
            stroke-linecap="round"
            stroke-linejoin="round"
            pathLength="100"
          />
        </svg>
        <div id="celemsg"></div>
      </div>
    </div>
    <div
      id="modal"
      class="modal"
      onclick="if (event.target === this) closeForm();"
    >
      <div class="modalcard">
        <div id="modalbody"></div>
        <button class="btn gray" style="margin-top: 12px" onclick="closeForm()">
          닫기
        </button>
      </div>
    </div>
    <nav class="nav">
      <button id="nb-home" onclick="go('home')">
        <span
          ><svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 11l9-8 9 8" />
            <path d="M5 10v10h5v-6h4v6h5V10" /></svg></span
        >홈
      </button>
      <button id="nb-work" onclick="go('work')">
        <span
          ><svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M6.5 7v10M17.5 7v10M3.5 9.5v5M20.5 9.5v5M6.5 12h11"
            /></svg></span
        >운동
      </button>
      <button id="nb-meal" onclick="go('meal')">
        <span
          ><svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M5 3v7a2.5 2.5 0 005 0V3M7.5 10v11" />
            <path d="M17 3c-1.7 0-2.8 2.2-2.8 5S15.3 13 17 13v8" /></svg></span
        >식단
      </button>
      <button id="nb-rep" onclick="go('rep')">
        <span
          ><svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M4 20V11M10 20V4M16 20v-6M3 20h18" /></svg></span
        >리포트
      </button>
      <button id="nb-coach" onclick="go('coach')">
        <span><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16v11H8l-4 4V5z"/><path d="M9 10h.01M13 10h.01"/></svg></span>코치
      </button>
      <button id="nb-set" onclick="go('set')">
        <span
          ><svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="16" cy="7" r="2" />
            <circle cx="8" cy="12" r="2" />
            <circle cx="12" cy="17" r="2" />
            <path
              d="M4 7h10M18 7h2M4 12h2M10 12h10M4 17h6M14 17h6"
            /></svg></span
        >설정
      </button>
    </nav>
    <script>
      // ===== 데이터 =====
      const KEY = 'fitapp1';
      let st = JSON.parse(localStorage.getItem(KEY) || 'null') || {
        profile: { h: '', w: '', goal: 'maintain', split: 3, kcal: '' },
        equip: [
          '바벨',
          '덤벨',
          'EZ바',
          '스미스머신',
          '케이블',
          '랫풀다운',
          '로우 머신',
          '체스트프레스 머신',
          '펙덱 머신',
          '숄더프레스 머신',
          '레그프레스',
          '핵스쿼트 머신',
          '레그컬 머신',

        var c = st.cur;
        var partsF = [
          '전체',
          '가슴',
          '등',
          '어깨',
          '삼두',
          '이두',
          '하체',
          '복근',
          '유산소',
        ];
        var chips = partsF
          .map(function (pp) {
            return (
              '<span class="chip' +
              (pkPart === pp ? ' on' : '') +
              '" onclick="setPkPart(\'' +
              pp +
              '\')">' +
              pp +
              '</span>'
            );
          })
          .join('');
        return (
          '<div class="top">' +
          esc(c.day) +
          ' <small>' +
          c.date +
          ' · 세트 완료 시 ✓ 누르면 휴식 타이머</small></div><div class="wrap">' +
          c.ex
            .map(function (e, ei) {
              var last = lastFor(e.n);
              var pr = prFor(e.n);
              var cardio = partOf(e.n) === '유산소';
              return (
                '<div class="card"><div class="row" style="justify-content:space-between"><span><span class="exname">' +
                esc(e.n) +
                '</span><button class="formbtn" onclick="openForm(\'' +
                e.n.replace(/'/g, "\\'") +
                '\')">자세</button></span><button class="del" onclick="delEx(' +
                ei +
                ')">✕</button></div>' +
                (last
                  ? '<span class="lastrec">지난: ' +
                    last.ex.sets
                      .map(function (s) {
                        return (s.kg || '-') + '×' + s.reps;
                      })
                      .join(', ') +
                    '</span>'
                  : '') +
                (pr.kg
                  ? '<span class="prbadge">최고 ' + pr.kg + 'kg</span>'
                  : '') +
                e.sets
                  .map(function (s, si) {
                    if (cardio)
                      return (
                        '<div class="setrow"><span class="no">' +
                        (si + 1) +
                        '</span><input style="flex:1" placeholder="시간/거리" value="' +
                        esc(s.reps) +
                        '" onchange="st.cur.ex[' +
                        ei +
                        '].sets[' +
                        si +
                        '].reps=this.value;save()"><button class="ck' +
                        (s.done ? ' on' : '') +
                        '" onclick="tick(' +
                        ei +
                        ',' +
                        si +
                        ')">✓</button></div>'
                      );
                    return (
                      '<div class="setrow"><span class="no">' +
                      (si + 1) +
                      '</span>' +
                      '<div class="stp"><button onclick="adj(' +
                      ei +
                      ',' +
                      si +
                      ',\'kg\',-2.5)">−</button><input inputmode="decimal" placeholder="kg" value="' +
                      esc(s.kg) +
                      '" onchange="st.cur.ex[' +
                      ei +
                      '].sets[' +
                      si +
                      '].kg=this.value;save()"><button onclick="adj(' +
                      ei +
                      ',' +
                      si +
                      ",'kg',2.5)\">+</button></div>" +
                      '<div class="stp"><button onclick="adj(' +
                      ei +
                      ',' +
                      si +
                      ',\'reps\',-1)">−</button><input inputmode="numeric" placeholder="회" value="' +
                      esc(s.reps) +
                      '" onchange="st.cur.ex[' +
                      ei +
                      '].sets[' +
                      si +
                      '].reps=this.value;save()"><button onclick="adj(' +
                      ei +
                      ',' +
                      si +
                      ",'reps',1)\">+</button></div>" +
                      '<button class="ck' +
                      (s.done ? ' on' : '') +
                      '" onclick="tick(' +
                      ei +
                      ',' +
                      si +
                      ')">✓</button></div>'
                    );
                  })
                  .join('') +
                '<br><button class="btn gray small" onclick="addSet(' +
                ei +
                ')">+ 세트 추가</button></div>'
              );
            })
            .join('') +
          '<div class="card"><h3>운동 추가</h3><input id="pkq" placeholder="운동 이름 검색..." value="' +
          esc(pkQ) +
          '" oninput="filterPicker()"><div style="margin:8px 0 2px">' +
          chips +
          '</div><div id="pklist" class="pklist">' +
          pickList() +
          '</div></div>' +
          '<div class="card"><h3>메모</h3><textarea rows="2" placeholder="컨디션, 특이사항..." onchange="st.cur.memo=this.value;save()">' +
          esc(c.memo) +
          '</textarea></div>' +
          '<button class="btn" onclick="finish()">운동 완료</button><br><br><button class="btn gray" onclick="saveRoutine()">⭐ 이 구성 루틴으로 저장</button><br><br><button class="btn red" onclick="if(confirm(\'기록을 버리고 취소할까요?\')){st.cur=null;save();render()}">운동 취소</button><br><br></div>'
        );
      }

      function tick(ei, si) {
        var s = st.cur.ex[ei].sets[si];
        s.done = !s.done;
        save();
        if (s.done && partOf(st.cur.ex[ei].n) !== '유산소')
          startTimer(GOALS[st.profile.goal].rest);
        render();
      }
      function addSet(ei) {
        const ss = st.cur.ex[ei].sets,
          l = ss[ss.length - 1];
        ss.push({ kg: l ? l.kg : '', reps: l ? l.reps : '', done: false });
        save();
        render();
      }
      function delEx(ei) {
        st.cur.ex.splice(ei, 1);
        save();
        render();
      }
      function addEx() {
        const n = $('expick').value;
        if (!n) return;
        const g = GOALS[st.profile.goal],
          s = suggestFor(n, 1);
        st.cur.ex.push({
          n: n,
          sets: Array.from({ length: g.s }, () => ({
            kg: s.kg,
            reps: g.r,
            done: false,
          })),
        });
        save();
        render();
      }
      function volume(log) {
        return log.ex.reduce(
          (a, e) =>
            a +
            e.sets
              .filter((s) => s.done)
              .reduce((b, s) => b + (+s.kg || 0) * (+s.reps || 0), 0),
          0,
        );
      }
      function finish() {
        var c = st.cur,
          doneSets = c.ex.reduce(function (a, e) {
            return (
              a +
              e.sets.filter(function (s) {
                return s.done;
              }).length
            );
          }, 0);
        if (!doneSets && !confirm('완료한 세트가 없어요. 그래도 저장할까요?'))
          return;
        var prs = [];
        c.ex.forEach(function (e) {
          var old = prFor(e.n).kg;
          var cur = Math.max.apply(
            null,
            [0].concat(
              e.sets
                .filter(function (s) {
                  return s.done;
                })
                .map(function (s) {
                  return +s.kg || 0;
                }),
            ),
          );
          if (cur > old && cur > 0) prs.push(e.n + ' ' + cur + 'kg');
        });
        c.ex.forEach(function (e) {
          e.sets = e.sets.filter(function (s) {
            return s.done || s.kg || s.reps;
          });
        });
        c.ex = c.ex.filter(function (e) {
          return e.sets.some(function (s) {
            return s.done;
          });
        });
        st.logs.push(c);
        st.cur = null;
        pick = null;
        save();
        stopTimer();
        var stk = streak();
        var html =
          '<div class="celeh">운동 완료!</div><div class="celev">' +
          Math.round(volume(c)).toLocaleString() +
          ' kg</div><div class="celes">오늘의 총 볼륨</div>';
        if (stk > 1) html += '<div class="celetag">' + stk + '일 연속</div>';
        if (prs.length)
          html += '<div class="celetag">' + esc(prs.join(', ')) + '</div>';
        celebrate(html);
      }
      function histHtml() {
        const h = st.logs.slice(-10).reverse();
        if (!h.length) return '';
        return (
          '<div class="card"><h3>최근 운동</h3>' +
          h
            .map(
              (l) =>
                '<div class="hist-item"><span><b>' +
                l.date +
                '</b> ' +
                esc(l.day) +
                '</span><span class="muted">' +
                l.ex.length +
                '종목 · ' +
                Math.round(volume(l)).toLocaleString() +
                'kg</span></div>',
            )
            .join('') +
          '</div>'
        );
      }

      // ===== 식단 =====
      function macroTargets() {
        var w = +st.profile.w,
          kcal = kcalTarget();
        if (!w || !kcal) return null;
        var g = st.profile.goal;
        var pk = g === 'diet' ? 2.0 : g === 'bulk' ? 1.9 : 1.6;
        var protein = Math.round(w * pk);
        var fat = Math.round((kcal * 0.25) / 9);
        var carb = Math.round((kcal - protein * 4 - fat * 9) / 4);
        if (carb < 0) carb = 0;
        return { kcal: kcal, protein: protein, carb: carb, fat: fat };
      }
      function todayMacros() {
        var list = st.meals[td()] || [],
          r = { k: 0, p: 0, c: 0, f: 0 };
        list.forEach(function (m) {
          r.k += +m.k || 0;
          r.p += +m.p || 0;
          r.c += +m.c || 0;
          r.f += +m.f || 0;
        });
        return r;
      }
      function mealRecommend() {
        var t = macroTargets();
        if (!t) return null;
        var m = todayMacros();
        var remK = t.kcal - m.k,
          remP = Math.round(t.protein - m.p);
        var msg;
        if (remK <= 0 && remP <= 0)
          msg = '오늘 목표를 다 채웠어요. 여기서 마무리해도 좋아요.';
        else if (remK <= 150 && remP > 12)
          msg =
            '칼로리는 거의 찼는데 단백질이 ' +
            remP +
            'g 모자라요. 저칼로리 고단백으로 채우세요.';
        else if (remP > 25)
          msg =
            '단백질이 ' +
            remP +
            'g 부족해요. 아래에서 단백질 위주로 채우면 좋아요.';
        else if (remK > 400)
          msg =
            '아직 ' +
            Math.max(0, Math.round(remK)) +
            'kcal 남았어요. 아래에서 골라 드세요.';
        else msg = '거의 다 왔어요. 가볍게 마무리하세요.';
        var pool;
        if (remP > 12)
          pool = FOODS.slice().sort(function (a, b) {
            return b[2] / (b[1] || 1) - a[2] / (a[1] || 1);
          });
        else {
          var tg = Math.max(120, remK / 2);
          pool = FOODS.slice().sort(function (a, b) {
            return Math.abs(a[1] - tg) - Math.abs(b[1] - tg);
          });
        }
        return { msg: msg, items: pool.slice(0, 3) };
      }
      function mbar(label, val, tgt, color) {
        var pct = tgt ? Math.min(100, (val / tgt) * 100) : 0;
        return (
          '<div class="mrow"><span class="mlab">' +
          label +
          '</span><div class="bar"><i style="width:' +
          pct +
          '%;background:' +
          color +
          '"></i></div><span class="mval">' +
          Math.round(val) +
          '/' +
          tgt +
          'g</span></div>'
        );
      }
      function meal() {
        var list = st.meals[td()] || [],
          t = macroTargets(),
          m = todayMacros(),
          kt = kcalTarget();
        var rec = t ? mealRecommend() : null;
        return (
          '<div class="top">오늘 식단 <small>' +
          td() +
          (kt ? ' · ' + m.k + ' / ' + kt + ' kcal' : '') +
          '</small></div><div class="wrap">' +
          (t
            ? '<div class="card"><h3>오늘 목표</h3>' +
              '<div class="mrow"><span class="mlab">칼로리</span><div class="bar"><i style="width:' +
              Math.min(100, (m.k / t.kcal) * 100) +
              '%;background:' +
              (m.k > t.kcal * 1.15 ? '#e5484d' : '#3182f6') +
              '"></i></div><span class="mval">' +
              m.k +
              '/' +
              t.kcal +
              '</span></div>' +
              mbar('단백질', m.p, t.protein, '#12b886') +
              mbar('탄수', m.c, t.carb, '#4dabf7') +
              mbar('지방', m.f, t.fat, '#f59f00') +
              '</div>'
            : '<div class="card muted">설정에서 몸무게·목표를 넣으면 칼로리·단백질 목표를 계산해줘요.</div>') +
          (rec
            ? '<div class="card"><h3>오늘 뭐 먹지?</h3><p class="muted" style="margin-bottom:6px">' +
              esc(rec.msg) +
              '</p>' +
              rec.items
                .map(function (f) {
                  var i = FOODS.indexOf(f);
                  return (
                    '<div class="meal-item"><span>' +
                    esc(f[0]) +
                    ' <span class="muted">' +
                    f[1] +
                    'kcal · 단백 ' +
                    f[2] +
                    'g</span></span><button class="btn small" style="flex:none" onclick="addMealF(' +
                    i +
                    ')">추가</button></div>'
                  );
                })
                .join('') +
              '</div>'
            : '') +
          '<div class="card"><h3>빠른 추가</h3>' +
          FOODS.map(function (f, i) {
            return (
              '<span class="chip" onclick="addMealF(' +
              i +
              ')">' +
              esc(f[0]) +
              ' <span style="opacity:.55">' +
              f[1] +
              '</span></span>'
            );
          }).join('') +
          '</div>' +
          '<div class="card"><h3>직접 입력</h3><div class="row"><input id="mn" placeholder="음식 이름"><input id="mk" inputmode="numeric" placeholder="kcal" style="max-width:78px;flex:none"><input id="mp" inputmode="numeric" placeholder="단백g" style="max-width:70px;flex:none"></div><br><button class="btn gray" onclick="addMeal($(\'mn\').value,$(\'mk\').value,$(\'mp\').value)">추가</button></div>' +
          '<div class="card"><h3>오늘 먹은 것</h3>' +
          (list.length
            ? list
                .map(function (m2, i) {
                  return (
                    '<div class="meal-item"><span>' +
                    esc(m2.n) +
                    (m2.p
                      ? ' <span class="muted">단백 ' + m2.p + 'g</span>'
                      : '') +
                    '</span><span>' +
                    m2.k +
                    ' kcal <button class="del" onclick="delMeal(' +
                    i +
                    ')">✕</button></span></div>'
                  );
                })
                .join('')
            : '<p class="muted">아직 기록이 없어요. 위에서 추가하세요.</p>') +
          '</div></div>'
        );
      }
      function addMealF(i) {
        var f = FOODS[i];
        (st.meals[td()] = st.meals[td()] || []).push({
          n: f[0],
          k: f[1],
          p: f[2],
          c: f[3],
          f: f[4],
        });
        save();
        render();
      }
      function addMeal(n, k, pr) {
        if (!n || !+k) {
          alert('음식 이름과 칼로리를 넣어주세요');
          return;
        }
        (st.meals[td()] = st.meals[td()] || []).push({
          n: n,
          k: +k,
          p: +pr || 0,
          c: 0,
          f: 0,
        });
        save();
        render();
      }
      function delMeal(i) {
        st.meals[td()].splice(i, 1);
        save();
        render();
      }

      // ===== 리포트 =====
      function daysAgo(ds) {
        return Math.floor((new Date(td()) - new Date(ds)) / 864e5);
      }
      function rep() {
        var wk = st.logs.filter(function (l) {
          return daysAgo(l.date) < 7;
        });
        var vol = wk.reduce(function (a, l) {
          return a + volume(l);
        }, 0);
        var parts = {};
        wk.forEach(function (l) {
          l.ex.forEach(function (e) {
            var x = EX.find(function (z) {
              return z[0] === e.n;
            });
            var pp = x ? x[1] : '기타';
            parts[pp] =
              (parts[pp] || 0) +
              e.sets.filter(function (s) {
                return s.done;
              }).length;
          });
        });
        var mx = Math.max(1, ...Object.values(parts));
        var names = {};
        st.logs.forEach(function (l) {
          l.ex.forEach(function (e) {
            names[e.n] = 1;
          });
        });
        var prs = Object.keys(names)
          .map(function (n) {
            var pr = prFor(n);
            return { n: n, kg: pr.kg, e: pr.e1rm };
          })
          .filter(function (x) {
            return x.kg > 0;
          })
          .sort(function (a, b) {
            return b.e - a.e;
          })
          .slice(0, 8);
        var body = st.body.slice(-30);
        var svg = '';
        if (body.length > 1) {
          var ws = body.map(function (b) {
              return +b.w;
            }),
            mn = Math.min.apply(null, ws),
            mxx = Math.max.apply(null, ws),
            rg = mxx - mn || 1;
          var pts = ws
            .map(function (w, i) {
              return (
                Math.round((i / (ws.length - 1)) * 300) +
                ',' +
                Math.round(70 - (((w - mn) / rg) * 55 + 5))
              );
            })
            .join(' ');
          svg =
            '<svg viewBox="0 0 300 80" style="width:100%"><polyline points="' +
            pts +
            '" fill="none" stroke="#3182f6" stroke-width="2.5" stroke-linecap="round"/></svg><p class="muted" style="text-align:right">' +
            mn +
            'kg ~ ' +
            mxx +
            'kg</p>';
        }
        var last = st.body.length ? st.body[st.body.length - 1] : null;
        return (
          '<div class="top">리포트</div><div class="wrap">' +
          '<div class="card"><h3>이번 주 (7일)</h3><div class="grid2"><div><span class="big">' +
          wk.length +
          '</span><p class="muted">운동 횟수</p></div><div><span class="big">' +
          Math.round(vol).toLocaleString() +
          '</span><p class="muted">총 볼륨 (kg)</p></div></div></div>' +
          (prs.length
            ? '<div class="card"><h3>개인기록 (PR)</h3>' +
              prs
                .map(function (x) {
                  return (
                    '<div class="hist-item"><span>' +
                    esc(x.n) +
                    '</span><span><b>' +
                    x.kg +
                    'kg</b> <span class="muted">추정1RM ' +
                    x.e +
                    '</span></span></div>'
                  );
                })
                .join('') +
              '</div>'
            : '') +
          '<div class="card"><h3>부위별 세트 수 (7일)</h3>' +
          (Object.keys(parts).length
            ? Object.entries(parts)
                .sort(function (a, b) {
                  return b[1] - a[1];
                })
                .map(function (kv) {
                  return (
                    '<div class="pbar"><b>' +
                    kv[0] +
                    '</b><div class="bar"><i style="width:' +
                    (kv[1] / mx) * 100 +
                    '%"></i></div><span>' +
                    kv[1] +
                    '세트</span></div>'
                  );
                })
                .join('')
            : '<p class="muted">이번 주 첫 운동을 시작하면 여기에 채워져요.</p>') +
          '</div>' +
          '<div class="card"><h3>몸 상태 기록</h3><div class="row"><input id="bw" inputmode="decimal" placeholder="몸무게 kg"><input id="bf" inputmode="decimal" placeholder="체지방 %"></div><div class="row" style="margin-top:8px"><input id="bwa" inputmode="decimal" placeholder="허리 cm"><input id="bar" inputmode="decimal" placeholder="팔 cm"><button class="btn small" style="flex:none" onclick="addBody()">기록</button></div>' +
          (last
            ? '<p class="muted" style="margin-top:8px">최근(' +
              last.date +
              '): ' +
              last.w +
              'kg' +
              (last.f ? ' · 체지방 ' + last.f + '%' : '') +
              (last.waist ? ' · 허리 ' + last.waist + 'cm' : '') +
              (last.arm ? ' · 팔 ' + last.arm + 'cm' : '') +
              '</p>'
            : '') +
          '<br>' +
          svg +
          st.body
            .slice(-5)
            .reverse()
            .map(function (b) {
              return (
                '<div class="hist-item"><span>' +
                b.date +
                '</span><span>' +
                b.w +
                'kg' +
                (b.f ? ' · 체지방 ' + b.f + '%' : '') +
                '</span></div>'
              );
            })
            .join('') +
          '</div>' +
          histHtml() +
          '</div>'
        );
      }
      function addBody() {
        var w = +$('bw').value;
        if (!w) {
          alert('몸무게를 입력해주세요');
          return;
        }
        st.body = st.body.filter(function (b) {
          return b.date !== td();
        });
        st.body.push({
          date: td(),
          w: w,
          f: +$('bf').value || '',
          waist: +$('bwa').value || '',
          arm: +$('bar').value || '',
        });
        st.profile.w = w;
        save();
        render();
      }

      // ===== 설정 =====
      function setting() {
        const p = st.profile;
        return (
          '<div class="top">설정</div><div class="wrap">' +
          '<div class="card"><h3>내 정보</h3><div class="grid2"><div><label class="f">키 (cm)</label><input inputmode="decimal" value="' +
          esc(p.h) +
          '" onchange="st.profile.h=this.value;save()"></div><div><label class="f">몸무게 (kg)</label><input inputmode="decimal" value="' +
          esc(p.w) +
          '" onchange="st.profile.w=this.value;save()"></div></div>' +
          '<label class="f">목표</label><select onchange="st.profile.goal=this.value;save();render()">' +
          Object.entries(GOALS)
            .map(function (kv) {
              return (
                '<option value="' +
                kv[0] +
                '"' +
                (p.goal === kv[0] ? ' selected' : '') +
                '>' +
                kv[1].t +
                '</option>'
              );
            })
            .join('') +
          '</select>' +
          '<label class="f">분할 (주 몇 부위로 나눌지)</label><select onchange="st.profile.split=+this.value;pick=null;save();render()"><option value="1"' +
          (p.split === 1 ? ' selected' : '') +
          '>무분할 (전신, 주 2~3회)</option><option value="2"' +
          (p.split === 2 ? ' selected' : '') +
          '>2분할 (상체/하체)</option><option value="3"' +
          (p.split === 3 ? ' selected' : '') +
          '>3분할 (추천)</option><option value="4"' +
          (p.split === 4 ? ' selected' : '') +
          '>4분할 (가슴·삼두/등·이두/어깨·복근/하체)</option></select>' +
          '<label class="f">하루 목표 칼로리 (비우면 몸무게로 자동 계산: 현재 ' +
          (kcalTarget() || '?') +
          'kcal)</label><input inputmode="numeric" value="' +
          esc(p.kcal) +
          '" onchange="st.profile.kcal=this.value;save()"></div>' +
          '<div class="card"><h3>내 헬스장 기구</h3><p class="muted">있는 것만 켜두면 그 기구로만 추천해요 (맨몸 운동은 항상 포함)</p><br>' +
          EQUIP.map(
            (q) =>
              '<span class="chip' +
              (st.equip.includes(q) ? ' on' : '') +
              '" onclick="tgEq(\'' +
              q +
              '\')">' +
              q +
              '</span>',
          ).join('') +
          '</div>' +
          '<div class="card"><h3>AI 코치</h3><p class="muted">밥 사진·설명을 올리면 칼로리를 계산하고, 내 기록에 맞춰 무게·강도를 추천해요. Anthropic API 키가 필요합니다(키는 이 기기에만 저장, 외부 유출 없음).</p><label class="f">API 키</label><input type="password" value="' + esc(st.apiKey || '') + '" placeholder="sk-ant-..." onchange="st.apiKey=this.value.trim();save()"><label class="f">모델</label><select onchange="st.model=this.value;save()">' + [['claude-opus-4-8','최고 성능 (Opus 4.8)'],['claude-sonnet-5','균형 (Sonnet 5)'],['claude-haiku-4-5','저렴·빠름 (Haiku 4.5)']].map(function(o){return '<option value="'+o[0]+'"'+((st.model||'claude-opus-4-8')===o[0]?' selected':'')+'>'+o[1]+'</option>';}).join('') + '</select><p class="muted" style="margin-top:8px">키 발급: console.anthropic.com → API Keys. 사용한 만큼만 소액 과금돼요.</p></div>' +
          '<div class="card"><h3>화면 테마</h3><div class="seg">' +
          [
            ['auto', '자동'],
            ['light', '밝게'],
            ['dark', '어둡게'],
          ]
            .map(function (o) {
              return (
                '<button class="' +
                ((st.theme || 'auto') === o[0] ? 'on' : '') +
                '" onclick="setTheme(\'' +
                o[0] +
                '\')">' +
                o[1] +
                '</button>'
              );
            })
            .join('') +
          '</div></div>' +
          '<div class="card"><h3>데이터</h3><button class="btn gray" onclick="backup()">백업 파일 다운로드</button><label class="f">백업 파일 복원</label><input type="file" accept=".json" onchange="restore(this)"></div>' +
          '<div class="card muted">폰 홈 화면에 추가: 브라우저 메뉴 → "홈 화면에 추가"를 누르면 앱처럼 설치돼요.</div></div>'
        );
      }
      function tgEq(q) {
        const i = st.equip.indexOf(q);
        i < 0 ? st.equip.push(q) : st.equip.splice(i, 1);
        save();
        render();
      }
      function backup() {
        var a = document.createElement('a');
        a.href = URL.createObjectURL(
          new Blob([JSON.stringify(st)], { type: 'application/json' }),
        );
        a.download = '마이핏백업_' + td() + '.json';
        a.click();
        st.lastBackup = td();
        save();
      }
      function restore(inp) {
        const f = inp.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = function () {
          try {
            const d = JSON.parse(r.result);
            if (!d.profile || !d.logs) throw 0;
            st = d;
            save();
            alert('복원 완료!');
            render();
          } catch (e) {
            alert('올바른 백업 파일이 아니에요');
          }
        };
        r.readAsText(f);
      }

      // ===== 휴식 타이머 =====
      let tLeft = 0,
        tInt = null;
      function startTimer(sec) {
        tLeft = sec;
        $('timerbar').classList.add('show');
        clearInterval(tInt);
        tInt = setInterval(function () {
          tLeft--;
          $('tval').textContent =
            Math.floor(tLeft / 60) + ':' + String(tLeft % 60).padStart(2, '0');
          if (tLeft <= 0) {
            stopTimer();
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
          }
        }, 1000);
        $('tval').textContent =
          Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
      }
      function addTime() {
        tLeft += 30;
      }
      function stopTimer() {
        clearInterval(tInt);
        $('timerbar').classList.remove('show');
      }
      var _celt = null;
      function celebrate(html) {
        $('celemsg').innerHTML = html;
        var c = $('cele');
        c.classList.add('show');
        if (navigator.vibrate) navigator.vibrate(80);
        clearTimeout(_celt);
        _celt = setTimeout(function () {
          c.classList.remove('show');
          go('rep');
        }, 2000);
        c.onclick = function () {
          c.classList.remove('show');
          clearTimeout(_celt);
          go('rep');
        };
      }

      if ('serviceWorker' in navigator && location.protocol.startsWith('http'))
        navigator.serviceWorker.register('sw.js');
      // ===== AI 코치 =====
      var coachMsgs = [];
      var coachBusy = false;
      const COACH_TOOLS = [
        { name: 'log_food', description: '사용자가 먹은 음식을 오늘 식단에 기록한다. 사진이나 설명에서 음식을 파악해 각 항목의 칼로리와 매크로(단백질/탄수/지방 g)를 추정해 기록한다.', input_schema: { type: 'object', properties: { items: { type: 'array', items: { type: 'object', properties: { name: { type: 'string' }, kcal: { type: 'number' }, protein: { type: 'number' }, carb: { type: 'number' }, fat: { type: 'number' } }, required: ['name', 'kcal', 'protein', 'carb', 'fat'] } } }, required: ['items'] } },
        { name: 'log_inbody', description: '인바디(체성분) 결과를 기록한다. 결과지 사진에서 체중(kg)·체지방률(%)·골격근량 등을 읽어 기록한다.', input_schema: { type: 'object', properties: { weight: { type: 'number' }, bodyFat: { type: 'number' }, muscle: { type: 'number' }, waist: { type: 'number' }, arm: { type: 'number' } }, required: ['weight'] } },
      ];
      function coachSystem() {
        var pf = st.profile, t = macroTargets(), m = todayMacros();
        var recent = st.logs.slice(-5).reverse().map(function (l) { return l.date + ' ' + l.day + '(' + l.ex.map(function (e) { var pr = prFor(e.n); return e.n + (pr.kg ? ' ' + pr.kg + 'kg' : ''); }).join(', ') + ')'; }).join(' / ');
        return (
          '너는 사용자의 개인 헬스·식단 코치다. 한국어로, 장식 이모지 없이, 간결하고 실용적으로 답한다. 짧게 핵심부터 말하고 근거를 덧붙인다.\n' +
          '사용자 정보: 키 ' + (pf.h || '?') + 'cm, 몸무게 ' + (pf.w || '?') + 'kg, 목표 ' + GOALS[pf.goal].t + ', ' + pf.split + '분할.\n' +
          (t ? '오늘 목표: ' + t.kcal + 'kcal / 단백질 ' + t.protein + 'g / 탄수 ' + t.carb + 'g / 지방 ' + t.fat + 'g. 현재 섭취: ' + m.k + 'kcal / 단백질 ' + Math.round(m.p) + 'g.\n' : '') +
          '최근 운동(종목·최고중량): ' + (recent || '기록 없음') + '.\n' +
          '역할: (1) 무게·세트·강도 추천은 위 기록과 몸무게·목표를 근거로 구체적인 숫자로. (2) 사용자가 먹은 음식을 사진이나 글로 올리면 log_food 도구로 칼로리·매크로를 추정해 기록하고, 무엇을 얼마로 기록했는지 한 줄로 요약한다. (3) 인바디 결과지 사진을 올리면 log_inbody 도구로 수치를 기록한다. 추정은 대략치임을 처음 한 번만 짧게 알린다.'
        );
      }
      function execTool(name, input) {
        try {
          if (name === 'log_food') {
            var list = (st.meals[td()] = st.meals[td()] || []);
            (input.items || []).forEach(function (it) { list.push({ n: it.name, k: Math.round(+it.kcal || 0), p: Math.round(+it.protein || 0), c: Math.round(+it.carb || 0), f: Math.round(+it.fat || 0) }); });
            save();
            return '기록됨: ' + (input.items || []).map(function (it) { return it.name + ' ' + Math.round(+it.kcal || 0) + 'kcal'; }).join(', ');
          }
          if (name === 'log_inbody') {
            st.body = st.body.filter(function (b) { return b.date !== td(); });
            st.body.push({ date: td(), w: +input.weight || 0, f: +input.bodyFat || '', muscle: +input.muscle || '', waist: +input.waist || '', arm: +input.arm || '' });
            if (+input.weight) st.profile.w = +input.weight;
            save();
            return '인바디 기록됨: 체중 ' + input.weight + 'kg' + (input.bodyFat ? ', 체지방 ' + input.bodyFat + '%' : '') + (input.muscle ? ', 골격근 ' + input.muscle + 'kg' : '');
          }
        } catch (e) { return '기록 실패: ' + e.message; }
        return '알 수 없는 도구';
      }
      async function callClaude() {
        var r = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'content-type': 'application/json', 'x-api-key': st.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
          body: JSON.stringify({ model: st.model || 'claude-opus-4-8', max_tokens: 1024, system: coachSystem(), tools: COACH_TOOLS, messages: coachMsgs }),
        });
        if (!r.ok) throw new Error(r.status + ' ' + (await r.text()).slice(0, 200));
        return r.json();
      }
      async function coachSend(content) {
        if (!st.apiKey) { alert('설정에서 API 키를 먼저 넣어주세요'); go('set'); return; }
        if (coachBusy) return;
        coachBusy = true;
        coachMsgs.push({ role: 'user', content: content });
        render();
        try {
          while (true) {
            var resp = await callClaude();
            coachMsgs.push({ role: 'assistant', content: resp.content });
            if (resp.stop_reason === 'tool_use') {
              var results = resp.content.filter(function (b) { return b.type === 'tool_use'; }).map(function (b) { return { type: 'tool_result', tool_use_id: b.id, content: execTool(b.name, b.input) }; });
              coachMsgs.push({ role: 'user', content: results });
              render();
              continue;
            }
            break;
          }
        } catch (e) {
          coachMsgs.push({ role: 'assistant', content: [{ type: 'text', text: '오류: ' + e.message }] });
        }
        coachBusy = false;
        render();
      }
      function coachText() {
        var el = $('coachin'); if (!el) return;
        var v = el.value.trim(); if (!v) return;
        el.value = '';
        coachSend([{ type: 'text', text: v }]);
      }
      function coachPhoto(inp) {
        var f = inp.files[0]; if (!f) return;
        var rd = new FileReader();
        rd.onload = function () {
          var b64 = rd.result.split(',')[1];
          coachSend([{ type: 'image', source: { type: 'base64', media_type: f.type, data: b64 } }, { type: 'text', text: '이 사진 분석해서 기록해줘.' }]);
        };
        rd.readAsDataURL(inp.files[0]);
      }
      function coach() {
        var body;
        if (!st.apiKey) {
          body = '<div class="card muted">AI 코치를 쓰려면 설정에서 Anthropic API 키를 먼저 넣어주세요. 밥 사진을 올리면 칼로리를 계산하고, 내 기록에 맞춰 무게·강도를 추천해줘요.</div>';
        } else if (!coachMsgs.length) {
          body = '<div class="card muted">무엇이든 물어보세요. 예: "오늘 뭐부터 할까?", "벤치 무게 얼마로?", 먹은 밥 사진을 올리면 칼로리를 기록해줘요.</div>';
        } else {
          body = coachMsgs.map(function (msg) {
            if (msg.role === 'user') {
              if (typeof msg.content === 'string') return '';
              return msg.content.map(function (b) {
                if (b.type === 'text') return '<div class="cbubble me">' + esc(b.text) + '</div>';
                if (b.type === 'image') return '<div class="cbubble me"><img src="data:' + b.source.media_type + ';base64,' + b.source.data + '"></div>';
                return '';
              }).join('');
            }
            if (msg.role === 'assistant') {
              return msg.content.map(function (b) {
                if (b.type === 'text' && b.text.trim()) return '<div class="cbubble ai">' + esc(b.text) + '</div>';
                if (b.type === 'tool_use') return '<div class="cnote">기록 중...</div>';
                return '';
              }).join('');
            }
            return '';
          }).join('');
          if (coachBusy) body += '<div class="cnote">코치가 생각 중...</div>';
        }
        return (
          '<div class="top">AI 코치 <small>내 기록 기반 추천 · 밥 사진 칼로리 계산 · 인바디 인식</small></div>' +
          '<div class="wrap" id="coachwrap" style="padding-bottom:70px">' + body + '</div>' +
          (st.apiKey
            ? '<div class="coachbar"><label class="cphoto">사진<input type="file" accept="image/*" style="display:none" onchange="coachPhoto(this)"></label>' +
              '<input type="text" id="coachin" placeholder="무게 추천, 먹은 음식..." onkeydown="if(event.key===\'Enter\')coachText()"><button onclick="coachText()">전송</button></div>'
            : '')
        );
      }
      applyTheme();
      render();
    </script>
  </body>
</html>
